name: 🗡️ Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger it manually from GitHub UI

jobs:
  build-apk:
    name: EAS Build → APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install deps ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. EAS CLI + Expo token ─────────────────────────────────────────────
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}   # ← add this in repo Settings → Secrets

      # ── 5. Build APK ────────────────────────────────────────────────────────
      - name: Build APK (preview profile)
        run: eas build --platform android --profile preview --non-interactive
        # The finished APK URL is printed at the end of this step.
        # You can also find it at https://expo.dev → your project → Builds.
